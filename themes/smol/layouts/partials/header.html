<header class="site-header">
	<div>
		<a href="/">
			{{ $image := resources.Get "images/cnsld.svg" }}
			<img class="site-logo" src="{{ $image.RelPermalink }}" alt="cnsld.cc" height="50">
		</a>
		<nav class="main-nav">
			<ul>
				{{ with .Site.Menus.main }}
					{{ range . }}
						<li><a href="{{ .URL | relURL }}">{{ .Name }}</a></li>
					{{ end }}
				{{ end }}
				<li>
					<button id="theme-toggle" type="button" aria-label="Canviar tema">
						<svg class="icon-sun" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3" fill="none"></line><line x1="12" y1="21" x2="12" y2="23" fill="none"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" fill="none"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" fill="none"></line><line x1="1" y1="12" x2="3" y2="12" fill="none"></line><line x1="21" y1="12" x2="23" y2="12" fill="none"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" fill="none"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" fill="none"></line></svg>
						<svg class="icon-moon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
					</button>
				</li>
			</ul>
		</nav>
	</div>
</header>
